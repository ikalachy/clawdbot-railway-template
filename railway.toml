[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Optional: set requiredMountPath = "/data" if you want Railway to *refuse* deploy without a volume.
# Leaving it unset avoids blocking deploys when a volume is not attached yet (image still defaults HOME etc. via Dockerfile).

[variables]
# NOTE: Railway injects PORT automatically.
# Do not set PORT here; Railway templates may not apply it reliably and hardcoding
# can cause domain routing mismatches.
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
# HOME, XDG_CACHE_HOME, CAMOFOX_COOKIES_DIR: set in Dockerfile so redeploys stay predictable.
# Override in Railway Variables only if you need a non-default layout.
